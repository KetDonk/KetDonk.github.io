<body>
    <!-- Public -->
    <div class="card">
        <div class="card-name">MaliaMC Web</div>
        <hr>
        <div class="card-description">Minecraft server website</div>
        <hr>
        <div class="lang-tag"><span class="html-tag"><img src="./html.png" class="lang-icon"> HTML</span><span
                class="css-tag"><img src="./css.png" class="lang-icon"> CSS</span><span class="js-tag"><img
                    src="./js.png" class="lang-icon"> JS</span></div>
        <br>
        <button><a href="https://maliamc.com">✔ Go To</a></button>
    </div>
    <div class="card">
        <div class="card-name">Brit Bot</div>
        <hr>
        <div class="card-description">My Discord Bot</div>
        <hr>
        <div class="lang-tag"><span class="js-tag"><img src="./js.png" class="lang-icon"> JS</span></div>
        <br>
        <button><a href="https://github.com/DuckyGithub/CornerShop">✔ Go To</a></button>
    </div>
    <div class="card">
        <div class="card-name">Ducky Web</div>
        <hr>
        <div class="card-description">Website For Ducky</div>
        <hr>
        <div class="lang-tag"><span class="html-tag"><img src="./html.png" class="lang-icon"> HTML</span><span
                class="css-tag"><img src="./css.png" class="lang-icon"> CSS</span></div>
        <br>
        <button><a href="https://ducky.ketdonk.com">✔ Go To</a></button>
    </div>


    <!-- Private -->
    <div class="card">
        <div class="card-name">SpongeCraft</div>
        <hr>
        <div class="card-description">Fully Custom Server</div>
        <hr>
        <div class="lang-tag"><span class="html-tag"><img src="./java.png"
                    style="width: 16px;vertical-align: middle; margin-bottom: 4px;"> Java</span></div>
        <br>
        <button class="private"><a>🔒 Private</a></button>
    </div>
    <!-- Archived -->
    <div class="card">
        <div class="card-name">Old Malia Web</div>
        <hr>
        <div class="card-description">The Old Malia Web</div>
        <hr>
        <div class="lang-tag"><span class="html-tag"><img src="./html.png" class="lang-icon"> HTML</span><span
                class="css-tag"><img src="./css.png" class="lang-icon"> CSS</span><span class="js-tag"><img
                    src="./js.png" class="lang-icon"> JS</span></div>
        <br>
        <button class="archived"><a href="https://github.com/KetDonk/OldMalia">💤 Archived</a></button>
    </div>
